<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Globe v5 — Neural Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #07070f;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  }

  #container {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  #container canvas {
    position: absolute;
    inset: 0;
  }

  .heading {
    position: absolute;
    top: 44px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
    white-space: nowrap;
  }
  .s-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: #333348; display: block; margin-bottom: 10px; }
  .s-title { font-size: 44px; font-weight: 700; color: #eceaf5; letter-spacing: -0.5px; line-height: 1; }
  .s-title em { font-style: normal; color: #9d7cf7; }

  /* Icon layer */
  #icon-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  .pin {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    pointer-events: auto;
    cursor: default;
    will-change: transform, opacity, filter;
    transform-origin: 50% 50%;
  }

  .pin img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }

  .pin .pname {
    font-size: 8px;
    font-weight: 500;
    letter-spacing: 0.7px;
    color: rgba(255,255,255,0.45);
    white-space: nowrap;
    line-height: 1;
  }

  /* Tooltip */
  #tooltip {
    position: absolute;
    z-index: 30;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s ease;
  }
  #tooltip.show { opacity: 1; }

  .tt {
    background: rgba(7,5,22,0.93);
    border: 1px solid rgba(128,96,248,0.26);
    border-radius: 10px;
    padding: 11px 15px 12px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    min-width: 115px;
  }
  .tt-name { font-size: 13px; font-weight: 600; color: #f0eeff; margin-bottom: 2px; letter-spacing: -0.1px; }
  .tt-cat  { font-size: 10px; color: #40405a; margin-bottom: 8px; }
  .tt-tier { font-size: 9px; font-weight: 700; letter-spacing: 1.1px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; display: inline-block; }
  .t-core        { background: rgba(157,124,247,0.14); color: #b89cf9; border: 1px solid rgba(157,124,247,0.24); }
  .t-comfortable { background: rgba(78,148,255,0.12);  color: #7eb5ff; border: 1px solid rgba(78,148,255,0.24); }

  .hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #1e1e30;
    letter-spacing: 1px;
    z-index: 20;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="container">
  <div class="heading">
    <span class="s-label">Tech Stack</span>
    <h1 class="s-title">My <em>Skills</em></h1>
  </div>

  <div id="icon-layer"></div>

  <div id="tooltip">
    <div class="tt">
      <div class="tt-name" id="tt-name">—</div>
      <div class="tt-cat"  id="tt-cat">—</div>
      <span class="tt-tier" id="tt-tier">—</span>
    </div>
  </div>

  <p class="hint">Drag to rotate &nbsp;·&nbsp; Hover to explore</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ─────────────────────────────────────────────────────────────
   Tech data
───────────────────────────────────────────────────────────── */
const TECHS = [
  { name:'JavaScript',  cat:'Frontend',   tier:'core',        icon:'https://cdn.simpleicons.org/javascript/F7DF1E',     color:'#F7DF1E' },
  { name:'TypeScript',  cat:'Frontend',   tier:'core',        icon:'https://cdn.simpleicons.org/typescript/4C8EDA',     color:'#4C8EDA' },
  { name:'React',       cat:'Frontend',   tier:'core',        icon:'https://cdn.simpleicons.org/react/61DAFB',          color:'#61DAFB' },
  { name:'Next.js',     cat:'Frontend',   tier:'core',        icon:'https://cdn.simpleicons.org/nextdotjs/D4D4EE',      color:'#D4D4EE' },
  { name:'Tailwind',    cat:'Frontend',   tier:'core',        icon:'https://cdn.simpleicons.org/tailwindcss/22D3EE',    color:'#22D3EE' },
  { name:'Python',      cat:'Backend',    tier:'core',        icon:'https://cdn.simpleicons.org/python/FFD43B',         color:'#FFD43B' },
  { name:'Node.js',     cat:'Backend',    tier:'comfortable', icon:'https://cdn.simpleicons.org/nodedotjs/74C948',      color:'#74C948' },
  { name:'PostgreSQL',  cat:'Databases',  tier:'comfortable', icon:'https://cdn.simpleicons.org/postgresql/6589E8',     color:'#6589E8' },
  { name:'Docker',      cat:'DevOps',     tier:'comfortable', icon:'https://cdn.simpleicons.org/docker/2496ED',         color:'#2496ED' },
  { name:'Git',         cat:'DevOps',     tier:'core',        icon:'https://cdn.simpleicons.org/git/F05032',            color:'#F05032' },
  { name:'GitHub',      cat:'DevOps',     tier:'core',        icon:'https://cdn.simpleicons.org/github/C0C0DC',         color:'#C0C0DC' },
  { name:'Azure AI',    cat:'AI & Cloud', tier:'comfortable', icon:'https://cdn.simpleicons.org/microsoftazure/3B90F5', color:'#3B90F5' },
  { name:'Power BI',    cat:'Data & Viz', tier:'comfortable', icon:'https://cdn.simpleicons.org/powerbi/F2C811',        color:'#F2C811' },
  { name:'Pandas',      cat:'Data & Viz', tier:'comfortable', icon:'https://cdn.simpleicons.org/pandas/C8A0F0',         color:'#C8A0F0' },
];

/* ─────────────────────────────────────────────────────────────
   Sphere geometry helpers
───────────────────────────────────────────────────────────── */
function fibSphere(n) {
  const pts = [], phi = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y  = 1 - (i / (n - 1)) * 2;
    const rr = Math.sqrt(1 - y * y);
    const t  = phi * i;
    pts.push(new THREE.Vector3(Math.cos(t) * rr, y, Math.sin(t) * rr));
  }
  return pts;
}

function randomOnSphere() {
  const phi = Math.acos(2 * Math.random() - 1);
  const th  = Math.random() * Math.PI * 2;
  return new THREE.Vector3(Math.sin(phi)*Math.cos(th), Math.sin(phi)*Math.sin(th), Math.cos(phi));
}

/* ─────────────────────────────────────────────────────────────
   Build neural-network graph on sphere surface
───────────────────────────────────────────────────────────── */
const R           = 420;
const N_EXTRA     = 68;     // background (non-icon) nodes
const K_CONNECT   = 3;      // each node connects to K nearest
const MAX_DOT     = 0.25;   // minimum dot product (cos ~75°) — no ultra-long edges

// Nodes: 0..13 = icon nodes, 14..N-1 = background nodes
const unitPts = [
  ...fibSphere(TECHS.length),
  ...Array.from({ length: N_EXTRA }, randomOnSphere),
];
const N = unitPts.length;

// World-space positions
const nodePts = unitPts.map(v => v.clone().multiplyScalar(R));

// Build edge list (K-nearest, no duplicates)
const edgeSet = new Set();
const edgeList = [];

unitPts.forEach((pt, i) => {
  const sorted = unitPts
    .map((q, j) => ({ j, d: pt.dot(q) }))
    .filter(x => x.j !== i)
    .sort((a, b) => b.d - a.d);

  let added = 0;
  for (const { j, d } of sorted) {
    if (added >= K_CONNECT) break;
    if (d < MAX_DOT)        break;
    const key = `${Math.min(i,j)}-${Math.max(i,j)}`;
    if (!edgeSet.has(key)) {
      edgeSet.add(key);
      edgeList.push([i, j]);
      added++;
    }
  }
});

/* ─────────────────────────────────────────────────────────────
   Scene
───────────────────────────────────────────────────────────── */
const container = document.getElementById('container');
let W = container.clientWidth, H = container.clientHeight;

const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(60, W/H, 1, 10000);
camera.position.z = 1050;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x07070f, 1);
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping   = true;
controls.dampingFactor   = 0.04;
controls.rotateSpeed     = 0.48;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.40;
controls.enableZoom      = false;
controls.enablePan       = false;
controls.minPolarAngle   = Math.PI * 0.18;
controls.maxPolarAngle   = Math.PI * 0.82;

/* ─────────────────────────────────────────────────────────────
   Edge geometry
───────────────────────────────────────────────────────────── */
(function buildEdges() {
  const verts = [];
  edgeList.forEach(([a, b]) => {
    verts.push(...nodePts[a].toArray(), ...nodePts[b].toArray());
  });

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));

  const mat = new THREE.LineBasicMaterial({
    color:       0x5533bb,
    transparent: true,
    opacity:     0.28,
    blending:    THREE.AdditiveBlending,
    depthTest:   false,
  });

  scene.add(new THREE.LineSegments(geo, mat));
})();

/* ─────────────────────────────────────────────────────────────
   Node dots  (two layers: crisp core + soft glow)
───────────────────────────────────────────────────────────── */
(function buildNodes() {
  const allPos   = new Float32Array(N * 3);
  const iconPos  = new Float32Array(TECHS.length * 3);

  nodePts.forEach((p, i) => { allPos[i*3]=p.x; allPos[i*3+1]=p.y; allPos[i*3+2]=p.z; });
  nodePts.slice(0, TECHS.length).forEach((p, i) => { iconPos[i*3]=p.x; iconPos[i*3+1]=p.y; iconPos[i*3+2]=p.z; });

  // Background nodes — small dim dots
  const bgGeo = new THREE.BufferGeometry();
  bgGeo.setAttribute('position', new THREE.Float32BufferAttribute(allPos, 3));
  scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({
    color: 0x6644dd, size: 2.8, sizeAttenuation: true,
    transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending, depthTest: false,
  })));

  // Background nodes — glow halo
  scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({
    color: 0x4422aa, size: 9, sizeAttenuation: true,
    transparent: true, opacity: 0.10, blending: THREE.AdditiveBlending, depthTest: false,
  })));

  // Icon nodes — brighter, larger
  const icGeo = new THREE.BufferGeometry();
  icGeo.setAttribute('position', new THREE.Float32BufferAttribute(iconPos, 3));
  scene.add(new THREE.Points(icGeo, new THREE.PointsMaterial({
    color: 0xaa88ff, size: 5.5, sizeAttenuation: true,
    transparent: true, opacity: 0.80, blending: THREE.AdditiveBlending, depthTest: false,
  })));
  scene.add(new THREE.Points(icGeo, new THREE.PointsMaterial({
    color: 0x7755ff, size: 18, sizeAttenuation: true,
    transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending, depthTest: false,
  })));
})();

/* ─────────────────────────────────────────────────────────────
   Per-icon hover highlight edges (precomputed, toggled by opacity)
───────────────────────────────────────────────────────────── */
const iconHighlights = TECHS.map((t, idx) => {
  const connected = edgeList.filter(([a, b]) => a === idx || b === idx);
  const verts = [];
  connected.forEach(([a, b]) => verts.push(...nodePts[a].toArray(), ...nodePts[b].toArray()));

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));

  const mat = new THREE.LineBasicMaterial({
    color:       new THREE.Color(t.color),
    transparent: true,
    opacity:     0,
    blending:    THREE.AdditiveBlending,
    depthTest:   false,
    linewidth:   1,
  });

  const lines = new THREE.LineSegments(geo, mat);
  scene.add(lines);
  return mat;
});

/* ─────────────────────────────────────────────────────────────
   DOM icon pins
───────────────────────────────────────────────────────────── */
const iconLayer = document.getElementById('icon-layer');
const tooltip   = document.getElementById('tooltip');
const ttName    = document.getElementById('tt-name');
const ttCat     = document.getElementById('tt-cat');
const ttTier    = document.getElementById('tt-tier');

let hovered = -1;

const pins = TECHS.map((t, i) => {
  const el = document.createElement('div');
  el.className = 'pin';
  el.innerHTML = `<img src="${t.icon}" alt="${t.name}"><span class="pname">${t.name}</span>`;
  el.style.position = 'absolute';
  iconLayer.appendChild(el);
  el.addEventListener('mouseenter', () => hovered = i);
  el.addEventListener('mouseleave', () => { hovered = -1; tooltip.classList.remove('show'); });
  return el;
});

/* ─────────────────────────────────────────────────────────────
   Resize
───────────────────────────────────────────────────────────── */
window.addEventListener('resize', () => {
  W = container.clientWidth; H = container.clientHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

/* ─────────────────────────────────────────────────────────────
   Render loop
───────────────────────────────────────────────────────────── */
const tmp = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const camDir = camera.position.clone().normalize();

  /* Update icon DOM pins */
  nodePts.slice(0, TECHS.length).forEach((wp, i) => {
    const facing = wp.clone().normalize().dot(camDir);
    const depth  = (facing + 1) / 2;

    tmp.copy(wp).project(camera);
    const sx = ( tmp.x + 1) / 2 * W;
    const sy = (-tmp.y + 1) / 2 * H;

    const isH    = i === hovered;
    const opacity = isH ? 1
      : facing > 0 ? Math.pow(facing, 0.50) * 0.90 + 0.08
      : Math.max(0, facing * 0.10 + 0.06);
    const scale  = isH ? 1.55 : 0.50 + depth * 0.50;
    const blurPx = (isH || facing >= 0) ? 0 : Math.min(2.5, Math.abs(facing) * 2.8);
    const zIdx   = isH ? 999 : Math.round(depth * 800);

    const el = pins[i];
    el.style.left      = sx + 'px';
    el.style.top       = sy + 'px';
    el.style.opacity   = opacity.toFixed(3);
    el.style.zIndex    = zIdx;
    el.style.transform = `translate(-50%,-54%) scale(${scale.toFixed(3)})`;
    el.style.filter    = isH
      ? `drop-shadow(0 0 10px ${TECHS[i].color}bb) brightness(1.2)`
      : blurPx > 0.1 ? `blur(${blurPx.toFixed(1)}px)` : 'none';

    /* Hover highlight edges */
    iconHighlights[i].opacity = isH ? 0.75 : 0;

    if (isH) {
      const side = sx > W/2 ? 42 : -(128 + 42);
      tooltip.style.left = (sx + side) + 'px';
      tooltip.style.top  = (sy - 26)   + 'px';
      ttName.textContent = TECHS[i].name;
      ttCat.textContent  = TECHS[i].cat;
      ttTier.textContent = TECHS[i].tier.charAt(0).toUpperCase() + TECHS[i].tier.slice(1);
      ttTier.className   = 'tt-tier t-' + TECHS[i].tier;
      tooltip.classList.add('show');
    }
  });

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
